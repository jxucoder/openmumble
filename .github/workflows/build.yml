name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Build (App Store)
        run: APP_STORE=1 make build

      - name: Build (Direct)
        run: make build

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: HoldToTalk.app
          path: .build/HoldToTalk.app
