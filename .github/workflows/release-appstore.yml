name: Release (App Store)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to submit (e.g. 1.0.0). Must match CFBundleShortVersionString."
        required: true
      build_number:
        description: "Optional CFBundleVersion override for corrected re-uploads (e.g. 1.0.1). Defaults to version."
        required: false

env:
  APP_NAME: HoldToTalk
  APP_BUNDLE: .build/HoldToTalk.app

jobs:
  build-and-upload:
    name: Build & Upload to App Store Connect
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Stamp version
        run: |
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${{ inputs.version }}"
          fi
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" Resources/Info.plist
          plutil -replace CFBundleShortVersionString -string "${{ inputs.version }}" Resources/Info.plist
          plutil -remove SUFeedURL Resources/Info.plist || true
          plutil -remove SUPublicEDKey Resources/Info.plist || true

      - name: Install signing certificates
        env:
          APP_CERTIFICATE_P12: ${{ secrets.APPSTORE_CERTIFICATE_P12 }}
          APP_CERTIFICATE_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE_P12: ${{ secrets.INSTALLER_CERTIFICATE_P12 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APP_CERTIFICATE_P12" | base64 --decode -o "$RUNNER_TEMP/app.p12"
          security import "$RUNNER_TEMP/app.p12" \
            -P "$APP_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          echo "$INSTALLER_CERTIFICATE_P12" | base64 --decode -o "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" \
            -P "$INSTALLER_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          APPSTORE_PROVISIONING_PROFILE: ${{ secrets.APPSTORE_PROVISIONING_PROFILE }}
        run: |
          if [ -z "$APPSTORE_PROVISIONING_PROFILE" ]; then
            echo "Missing APPSTORE_PROVISIONING_PROFILE secret" >&2
            exit 1
          fi

          PROFILE_PATH="$RUNNER_TEMP/HoldToTalk.provisionprofile"
          echo "$APPSTORE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/HoldToTalk.provisionprofile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.application-identifier" "$PROFILE_PLIST")
          TEAM_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.team-identifier" "$PROFILE_PLIST")

          echo "APPSTORE_PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"
          echo "APPSTORE_APPLICATION_IDENTIFIER=$APP_IDENTIFIER" >> "$GITHUB_ENV"
          echo "APPSTORE_TEAM_IDENTIFIER=$TEAM_IDENTIFIER" >> "$GITHUB_ENV"

          /usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST"
          /usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST"
          echo "$APP_IDENTIFIER"

      - name: Build
        run: |
          APP_STORE=1 swift build -c release

          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          cp ".build/release/$APP_NAME" "$APP_BUNDLE/Contents/MacOS/"
          cp Resources/Info.plist "$APP_BUNDLE/Contents/"
          cp Resources/HoldToTalk.icns "$APP_BUNDLE/Contents/Resources/"
          cp Resources/PrivacyInfo.xcprivacy "$APP_BUNDLE/Contents/Resources/"
          cp "$APPSTORE_PROFILE_PATH" "$APP_BUNDLE/Contents/embedded.provisionprofile"

          if [ -d "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework" ]; then
            echo "Unexpected Sparkle.framework in App Store bundle" >&2
            exit 1
          fi
          if /usr/libexec/PlistBuddy -c "Print :SUFeedURL" "$APP_BUNDLE/Contents/Info.plist" >/dev/null 2>&1; then
            echo "Unexpected SUFeedURL in App Store bundle" >&2
            exit 1
          fi
          if /usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" "$APP_BUNDLE/Contents/Info.plist" >/dev/null 2>&1; then
            echo "Unexpected SUPublicEDKey in App Store bundle" >&2
            exit 1
          fi
          if [ ! -f "$APP_BUNDLE/Contents/embedded.provisionprofile" ]; then
            echo "Missing embedded.provisionprofile in App Store bundle" >&2
            exit 1
          fi

      - name: Sign for App Store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Apple Distribution: Jiarui Xu ($APPLE_TEAM_ID)"
          APP_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_BUNDLE/Contents/Info.plist")
          EXPECTED_APP_IDENTIFIER="${APPSTORE_TEAM_IDENTIFIER}.${APP_BUNDLE_ID}"

          if [ "$APPSTORE_APPLICATION_IDENTIFIER" != "$EXPECTED_APP_IDENTIFIER" ]; then
            echo "Provisioning profile app identifier '$APPSTORE_APPLICATION_IDENTIFIER' does not match expected '$EXPECTED_APP_IDENTIFIER'" >&2
            exit 1
          fi

          ENTITLEMENTS_PATH="$RUNNER_TEMP/HoldToTalk.appstore.entitlements"
          cp Resources/HoldToTalk.entitlements "$ENTITLEMENTS_PATH"
          /usr/libexec/PlistBuddy -c "Add :com.apple.application-identifier string $APPSTORE_APPLICATION_IDENTIFIER" "$ENTITLEMENTS_PATH"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.team-identifier string $APPSTORE_TEAM_IDENTIFIER" "$ENTITLEMENTS_PATH"

          codesign -f --options runtime --timestamp \
            -s "$IDENTITY" \
            --entitlements "$ENTITLEMENTS_PATH" \
            "$APP_BUNDLE"

      - name: Package as .pkg
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          productbuild \
            --component "$APP_BUNDLE" /Applications \
            --sign "3rd Party Mac Developer Installer: Jiarui Xu ($APPLE_TEAM_ID)" \
            "$RUNNER_TEMP/$APP_NAME.pkg"

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/$APP_NAME.pkg" \
            --type macos \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --show-progress

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
